<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>brojka-web-2026 | GitHub Pages</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top right, #1f2937, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .ok {
      color: var(--accent);
      font-weight: 600;
    }
    ul {
      margin: 14px 0 0;
      padding-left: 18px;
      line-height: 1.6;
    }
    a {
      color: #93c5fd;
    }
    code {
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>brojka-web-2026</h1>
    <p class="ok">GitHub Pages deploy je aktivan.</p>
    <p>
      Ovaj deploy je statički preview sloj repozitorija.
      WordPress/PHP runtime se ne izvršava na GitHub Pages.
    </p>
    <ul>
      <li>Smoke checklist: <a href="./SMOKE_TEST_CHECKLIST.md">SMOKE_TEST_CHECKLIST.md</a></li>
      <li>Aktivni repo branch za Pages deploy: <code>main</code></li>
    </ul>
  </main>
</body>
</html>
